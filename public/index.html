<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 16px;
    }

    #app {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #chat-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 16px;
      height: 60vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      background: #3b82f6;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .assistant {
      background: #f1f5f9;
      color: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .assistant b { font-weight: 700; }
    .assistant ul { margin: 6px 0 6px 18px; }
    .assistant li { margin: 3px 0; }

    #input-row {
      display: flex;
      gap: 8px;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: #3b82f6; }

    #send-btn {
      padding: 12px 24px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #2563eb; }
    #send-btn:disabled { background: #93c5fd; cursor: default; }
  </style>
</head>
<body>
  <h1>✈️ Travel Planner</h1>
  <div id="app">
    <div id="chat-container"></div>
    <div id="input-row">
      <input type="text" id="user-input" placeholder="Ask about a trip… (e.g., Plan a weekend in Tokyo)">
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
